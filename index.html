// --- Deduplicate ---
const seen = new Set();
const DATA = [];
for (const d of RAW) {
  const k = d.company + '|' + d.ri + '|' + d.v + '|' + d.cat;
  if (!seen.has(k)) { seen.add(k); DATA.push(d); }
}

// --- Config ---
const ROUNDS = ['Seed','Series A','Series B','Series C','Series D','Series E','Series F'];
const W = 1000, H = 570;
const ML = 72, MR = 30, MT = 30, MB = 65;
const PW = W - ML - MR, PH = H - MT - MB;
const YMAX = 10000;

const STYLE = {
  other_active: {fill:'#D1D5DB', stroke:'#9ca3af', r:3.5, opacity:0.7, order:0},
  other_exit:   {fill:'#4B5563', stroke:'#374151', r:4.5, opacity:0.8, order:1},
  cs_exit:      {fill:'#DC2626', stroke:'#991b1b', r:7,   opacity:1,   order:2},
  cs_active:    {fill:'#2563EB', stroke:'#1e40af', r:7,   opacity:1,   order:3}
};

// --- Jitter (deterministic) ---
function hash(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = (h * 16777619) >>> 0; }
  return h;
}
DATA.forEach(d => {
  const range = d.cat.startsWith('cs_') ? 0.28 : 0.72;
  const seed = hash(d.company + String(d.v) + d.cat);
  const rnd = (seed % 10000) / 10000;
  d.jx = d.ri + (rnd - 0.5) * range;
});

// --- Scale functions ---
const xs = x => ML + ((x + 0.5) / 7) * PW;
const ys = v => MT + PH - (Math.min(v, YMAX) / YMAX) * PH;

// --- State ---
const active = new Set(Object.keys(STYLE));

// --- Render ---
const svg = document.getElementById('chart');
const tip = document.getElementById('tip');
const wrap = document.getElementById('wrap');
const NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}
function txt(text, attrs, parent) {
  const e = el('text', attrs, parent);
  e.textContent = text;
  return e;
}

function render() {
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // Grid lines + Y labels
  for (let v = 0; v <= YMAX; v += 1000) {
    const y = ys(v);
    el('line', {x1:ML, x2:W-MR, y1:y, y2:y, class: v===0 ? 'axisline' : 'gridline'}, svg);
    const lbl = v === 0 ? '$0' : `$${v/1000}B`;
    txt(lbl, {x:ML-8, y:y+4, 'text-anchor':'end', class:'tick-label'}, svg);
  }

  // X axis labels + vertical guides
  for (let i = 0; i < 7; i++) {
    const x = xs(i);
    el('line', {x1:x, x2:x, y1:MT, y2:MT+PH, stroke:'#f3f4f6', 'stroke-width':'1'}, svg);
    txt(ROUNDS[i], {x, y:H-MB+22, 'text-anchor':'middle', class:'round-label'}, svg);
  }

  // Axis titles
  {
    const t = el('text', {transform:`translate(18,${MT+PH/2}) rotate(-90)`, 'text-anchor':'middle', class:'axis-title'}, svg);
    t.textContent = 'Exit Value / Last-Round Valuation ($M)';
  }
  {
    const t = el('text', {x:ML+PW/2, y:H-10, 'text-anchor':'middle', class:'axis-title'}, svg);
    t.textContent = 'Last Round Before Exit / Current Round';
  }

  // Dots (sorted so cs_* render on top)
  const sorted = [...DATA].sort((a,b) => STYLE[a.cat].order - STYLE[b.cat].order);
  for (const d of sorted) {
    if (!active.has(d.cat)) continue;
    const s = STYLE[d.cat];
    const cx = xs(d.jx), cy = ys(d.v);
    if (cy < MT - 10) continue; // clipped above $10B

    const c = el('circle', {
      cx, cy, r: s.r,
      fill: s.fill, stroke: s.stroke, 'stroke-width': '1.2',
      opacity: s.opacity, class: 'dot'
    }, svg);
    c.addEventListener('mouseenter', e => showTip(e, d));
    c.addEventListener('mousemove', moveTip);
    c.addEventListener('mouseleave', hideTip);
  }

  // Labels on Cyberstarts dots only
  for (const d of sorted) {
    if (!active.has(d.cat) || !d.cat.startsWith('cs_')) continue;
    const cx = xs(d.jx), cy = ys(d.v);
    if (cy < MT - 10) continue;
    const name = d.company
      .replace(/ Ltd\.$/, '').replace(/ Inc\.$/, '').replace(/ Ltd$/, '').replace(/ Inc$/, '')
      .replace(' Technologies', '').replace(' Security', '').replace(' Cyber', '')
      .replace(' Solutions', '').replace(/ Technology$/, '');
    txt(name, {
      x: cx, y: cy - 10,
      'text-anchor': 'middle', class: 'company-label',
      fill: d.cat === 'cs_exit' ? '#991b1b' : '#1e40af'
    }, svg);
  }
}

function fmtV(v) {
  if (v >= 1000) return `$${(v/1000).toFixed(v%1000===0?0:1)}B`;
  if (v < 1)    return `$${v}M`;
  return `$${Math.round(v)}M`;
}

function showTip(e, d) {
  const catName = {
    cs_exit:      'Cyberstarts Exited',
    cs_active:    'Cyberstarts Active',
    other_exit:   'Other Exited',
    other_active: 'Other Active'
  }[d.cat];
  const valLabel = d.cat.includes('exit') && d.year ? 'Exit Value' : 'Last-Round Val.';
  let h = `<b>${d.company}</b>`;
  h += `<div class="tr"><span class="tl">Category</span><span class="tv">${catName}</span></div>`;
  h += `<div class="tr"><span class="tl">Round</span><span class="tv">${d.round}</span></div>`;
  h += `<div class="tr"><span class="tl">${valLabel}</span><span class="tv">${fmtV(d.v)}</span></div>`;
  if (d.year)      h += `<div class="tr"><span class="tl">Exit Year</span><span class="tv">${d.year}</span></div>`;
  if (d.exit_type) h += `<div class="tr"><span class="tl">Exit Type</span><span class="tv">${d.exit_type}</span></div>`;
  if (d.tv) {
    const tv = d.tv.trim();
    h += `<div class="vt">${tv.length > 100 ? tv.slice(0, 100) + '…' : tv}</div>`;
  }
  tip.innerHTML = h;
  tip.style.opacity = '1';
  moveTip(e);
}
function moveTip(e) {
  const r = wrap.getBoundingClientRect();
  let x = e.clientX - r.left + 14, y = e.clientY - r.top + 14;
  if (x + tip.offsetWidth  > r.width  - 4) x = e.clientX - r.left - tip.offsetWidth  - 14;
  if (y + tip.offsetHeight > r.height - 4) y = e.clientY - r.top  - tip.offsetHeight - 14;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}
function hideTip() { tip.style.opacity = '0'; }

// Legend toggles
document.querySelectorAll('.leg').forEach(el => {
  el.addEventListener('click', () => {
    const cat = el.dataset.cat;
    if (active.has(cat)) { active.delete(cat); el.classList.add('off'); }
    else                 { active.add(cat);    el.classList.remove('off'); }
    render();
  });
});

render();
</script>
